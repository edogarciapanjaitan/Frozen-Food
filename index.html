<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bang Ben Frozen & Snack</title>
    <style>

        body { 
        font-family: Arial, sans-serif; 
        background-color: #f4f4f4; 
        margin: 0; 
        padding: 20px; 
        }

        header { 
        text-align: center; 
        padding: 20px; 
        background-image: url('FF1.jpg');
        background-size:cover;
        background-position: center; 
        border-radius: 10px; 
        margin-bottom: 20px;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        /* Layout Katalog */
        .katalog { 
        display: grid; 
        grid-template-columns: repeat(3, 1fr); 
        gap: 20px; 
    }
        .produk-card { 
        background: white; 
        padding: 15px; 
        border-radius: 10px; 
        box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
        text-align: center;
        }

        .produk-card img {
        max-width: 100%; 
        border-radius: 8px; 
        height: 150px; 
        object-fit: cover; 
        }

        .harga { 
        color: #e67e22; 
        font-weight: bold; 
        font-size: 1.2em; 
        margin: 10px 0; 
        }
        
        button { 
        background: #87CEEB; 
        color: white; 
        border: none; 
        padding: 10px 15px; 
        border-radius: 5px; 
        cursor: pointer; 
        width: 100%; 
        }

        button:hover { background: #00BFFF; }

        /* Area Keranjang */
        .keranjang { 
        margin-top: 40px; 
        background: white; 
        padding: 20px; 
        border-radius: 10px; 
        border-top: 5px solid #87CEEB; 
        }
        .item-keranjang { 
        display: flex; 
        justify-content: space-between; 
        border-bottom: 1px solid #eee; 
        padding: 10px 0; 
        }
        .total { 
        font-size: 1.5em; 
        font-weight: bold; 
        text-align: right; 
        margin-top: 15px; 
        }
        
        .btn-wa { 
        background: #87CEEB; 
        font-size: 1.1em; 
        padding: 15px; 
        margin-top: 10px; 
        }

        .pagination { 
        text-align: center; 
        margin: 30px 0; 
        }

        .pagination button { 
        width: auto; 
        margin: 0 5px; 
        padding: 8px 15px; 
        background-color: #eee; 
        color: #333; 
        }

        .pagination button.active { 
        background-color: #393b3a; 
        color: white; 
        }

        /* Quantity Controls */
        .quantity-control {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .qty-btn {
            width: 28px;
            height: 28px;
            border-radius: 4px;
            border: 1px solid #ddd;
            background: #f0f0f0;
            color: #333;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .qty-btn:hover {
            background: #87CEEB;
            color: white;
            border-color: #87CEEB;
        }
        .qty-display {
            min-width: 30px;
            text-align: center;
            font-weight: bold;
        }
        .hapus-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            margin-left: 10px;
        }
        .hapus-btn:hover {
            background: #ff4757;
        }
        .item-keranjang {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
            padding: 10px 0;
        }
        .item-info {
            flex: 1;
        }
        .item-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

    </style>
</head>
<body>

<header>
    <h1>Bang Ben</h1>
    <h2>Frozen & Snack</h2>
    <p>Segar, Praktis, dan Simple</p>
</header>

<div class="katalog" id="katalog-produk"></div>

<div class="pagination" id="pagination-control"></div>

<div class="keranjang">
    <h2>🛒 Pesanan Anda</h2>
    <div id="daftar-pesanan">
        <p style="color: #888;">Belum ada produk yang dipilih.</p>
    </div>
    <div class="total">Total: Rp <span id="total-harga">0</span></div>
    <button class="btn-wa" onclick="kirimWA()">Pesan via WhatsApp</button>
</div>

<script>
    let keranjang = [];
    let totalHarga = 0;
    const itemPerHalaman = 15;
    let halamanSekarang = 1;

    // 1. DATA PRODUK
    const semuaProduk = [
        { nama: "Nugget Kanzler (450g)", harga: 45000, img: "nugget.jpg" },
        { nama: "GoGo French Fries Shoestring (1kg)", harga: 35000, img: "bakso.jpg" },
        { nama: "GoGo French Fries 1kg (Crincle Cut)", harga: 37000, img: "sosis.jpg" },
        { nama: "Ayam Ungkep (8 pcs)", harga: 45000, img: "kentang.jpg" },
        { nama: "Sosis Sapi Kimbo (10 pcs)", harga: 35000, img: "siomay.jpg" },
        { nama: "Gyoza Prima (250g)", harga: 24000, img: "siomay.jpg" },
        { nama: "Roti Maryam Coklat (5pcs)", harga: 24000, img: "siomay.jpg" },
        { nama: "Nugget So Eco (1kg)", harga: 36000, img: "siomay.jpg" },
        { nama: "Bakso Warisan (isi 50)", harga: 35000, img: "siomay.jpg" },
        { nama: "Chicken Nugget Bellfood Crunchy (500g)", harga: 38000, img: "siomay.jpg" },
        { nama: "Keripik Pisang (500g)", harga: 30000, img: "siomay.jpg" },
        { nama: "Keripik Singkong Original", harga: 30000, img: "siomay.jpg" },
        { nama: "Siomay Ikan", harga: 30000, img: "siomay.jpg" },
        { nama: "Siomay Ikan", harga: 30000, img: "siomay.jpg" },
        { nama: "Siomay Ikan", harga: 30000, img: "siomay.jpg" },
        { nama: "Siomay Ikan", harga: 30000, img: "siomay.jpg" },
        { nama: "Siomay Ikan", harga: 30000, img: "siomay.jpg" },

        // ... tambahkan produk lainnya di sini
    ];

    // 2. FUNGSI MENAMPILKAN PRODUK
    function tampilkanProduk(halaman) {
        const start = (halaman - 1) * itemPerHalaman;
        const end = start + itemPerHalaman;
        const produkTampil = semuaProduk.slice(start, end);

        const container = document.getElementById('katalog-produk');
        container.innerHTML = ''; // Kosongkan katalog sebelum isi baru

        produkTampil.forEach(produk => {
            // PERBAIKAN: Gunakan 'container.innerHTML', bukan 'katalog.innerHTML'
            container.innerHTML += `
                <div class="produk-card">
                    <img src="${produk.img}" alt="${produk.nama}">
                    <h3>${produk.nama}</h3>
                    <p class="harga">Rp ${produk.harga.toLocaleString()}</p>
                    <button onclick="tambahKeKeranjang('${produk.nama}', ${produk.harga})">Tambah</button>
                </div>
            `;
        });
        buatTombolPagination();
    }

    // 3. FUNGSI PAGINATION
    function buatTombolPagination() {
        const totalHalaman = Math.ceil(semuaProduk.length / itemPerHalaman);
        const kontrol = document.getElementById('pagination-control'); // Pastikan ID sesuai HTML
        kontrol.innerHTML = "";

        for (let i = 1; i <= totalHalaman; i++) {
            kontrol.innerHTML += `
                <button class="${i === halamanSekarang ? 'active' : ''}" 
                        onclick="gantiHalaman(${i})">${i}</button>
            `;
        }
    }

    function gantiHalaman(halaman) {
        halamanSekarang = halaman;
        tampilkanProduk(halaman);
        window.scrollTo(0,0); // Kembali ke atas saat pindah halaman
    }

    // 4. FUNGSI KERANJANG & WHATSAPP
    function tambahKeKeranjang(nama, harga) {
        // Cek apakah produk sudah ada di keranjang
        const itemAda = keranjang.find(item => item.nama === nama);
        if (itemAda) {
            itemAda.qty += 1;
            totalHarga += harga;
        } else {
            keranjang.push({nama, harga, qty: 1});
            totalHarga += harga;
        }
        updateTampilan();
        alert(nama + " berhasil ditambahkan ke keranjang!");
    }

    function ubahQuantity(index, perubahan) {
        const item = keranjang[index];
        const qtyBaru = item.qty + perubahan;
        
        if (qtyBaru <= 0) {
            // Hapus item jika qty = 0
            hapusItem(index);
        } else {
            item.qty = qtyBaru;
            totalHarga += item.harga * perubahan;
            updateTampilan();
        }
    }

    function hapusItem(index) {
        const item = keranjang[index];
        totalHarga -= item.harga * item.qty;
        keranjang.splice(index, 1);
        updateTampilan();
    }

    function updateTampilan() {
        const list = document.getElementById('daftar-pesanan');
        const totalDisplay = document.getElementById('total-harga');
        
        list.innerHTML = '';
        if (keranjang.length === 0) {
            list.innerHTML = '<p style="color: #888;">Belum ada produk yang dipilih.</p>';
        } else {
            keranjang.forEach((item, index) => {
                const subtotal = item.harga * item.qty;
                list.innerHTML += `<div class="item-keranjang">
                    <div class="item-info">
                        <strong>${item.nama}</strong><br>
                        <small>Rp ${item.harga.toLocaleString()} /pcs</small>
                    </div>
                    <div class="item-actions">
                        <div class="quantity-control">
                            <button class="qty-btn" onclick="ubahQuantity(${index}, -1)">-</button>
                            <span class="qty-display">${item.qty}</span>
                            <button class="qty-btn" onclick="ubahQuantity(${index}, 1)">+</button>
                        </div>
                        <span style="font-weight:bold; min-width:80px; text-align:right;">
                            Rp ${subtotal.toLocaleString()}
                        </span>
                        <button class="hapus-btn" onclick="hapusItem(${index})">Hapus</button>
                    </div>
                </div>`;
            });
        }
        totalDisplay.innerText = totalHarga.toLocaleString();
    }

    function kirimWA() {
        if (keranjang.length === 0) {
            alert("Keranjang masih kosong!");
            return;
        }
        const nomorWA = "6282110798852";
        let pesan = "Halo Admin Bang Ben, saya mau pesan:\n\n";
        keranjang.forEach((item, i) => {
            const subtotal = item.harga * item.qty;
            pesan += `${i+1}. ${item.nama} - ${item.qty}x @ Rp ${item.harga.toLocaleString()}\n   Subtotal: Rp ${subtotal.toLocaleString()}\n`;
        });
        pesan += `\n*Total: Rp ${totalHarga.toLocaleString()}*`;
        
        window.open(`https://wa.me/${nomorWA}?text=${encodeURIComponent(pesan)}`, '_blank');
    }

    // PENTING: Jalankan fungsi ini pertama kali saat halaman dibuka
    tampilkanProduk(halamanSekarang);
</script>

</body>
</html>
